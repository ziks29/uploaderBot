name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build & Release Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build cross-platform binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/uploaderBot-linux-amd64    .
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/uploaderBot-linux-arm64    .
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/uploaderBot-windows-amd64.exe .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/uploaderBot-darwin-amd64  .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/uploaderBot-darwin-arm64  .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
